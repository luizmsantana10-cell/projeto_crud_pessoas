<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoa - CRUD</title>

    <link rel="stylesheet" href="css/style_pessoas.css">

    <script src="js/script.js" type="module" defer ></script>
</head>
<body>
    <div id="geral">
        <h3>Cadastro Aluno</h3>

        <div id="div-regras">
            <p>Pessoas menor de idade ou renda menor ou IGUAL a 1700 - isentas de desconto</p>
            <p>de 1701 ate 5000 - 5% desconto</p>
            <p>de 5001 ate 8000 - 10%</p>
            <p>8001 ate 12000 - 15%</p>
            <p>acima de 12000 - 20%</p>
        </div>

        <div id="div-form-pessoa">
            <form id="form-pessoa">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" required placeholder="Digite o nome">

                <label for="idade">Idade</label>
                <input type="number" name="idade" id="idade" min="0" required placeholder="Digite a idade">

                <label for="renda">Renda</label>
                <input type="number" name="renda" id="renda" step="0.01" min="0" required placeholder="Ex: 1200.00">

                <div class="container-botoes">
                    <button type="submit" id="btn-add"> Adicionar </button>
                    <button type="reset" id="btn-limpar"> Limpar </button>
                </div>
            </form>
        </div>

        <div id="div-lista-pessoas"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
